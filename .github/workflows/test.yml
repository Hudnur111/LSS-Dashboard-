name: Tests

on:
  push:
    branches: [dashboard, tampermonkey, main]
  pull_request:
    branches: [dashboard, tampermonkey, main]

jobs:
  test:
    name: Desktop-App Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: desktop-app
        run: npm install

      - name: Run tests
        working-directory: desktop-app
        run: npm test
